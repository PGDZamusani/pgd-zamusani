<title>PGD Zamušani</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
}

/* MENU */
nav {
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.7);
    padding:15px;
    text-align:center;
    z-index:1000;
}

nav a {
    color:white;
    margin:0 12px;
    text-decoration:none;
    font-weight:bold;
    text-transform:uppercase;
    font-size:14px;
}

nav a:hover {
    color:red;
}

/* HERO */
.hero {
    height:100vh;
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:120px;
    animation: slideshow 75s infinite;
}

.hero h1 {
    color:white;
    font-size:90px;
    text-transform:uppercase;
    margin:0;
}

/* SLIDESHOW */
@keyframes slideshow {
    0% { background-image: url('hero1.jpg'); }
    33% { background-image: url('hero2.jpg'); }
    66% { background-image: url('hero3.jpeg'); }
    100% { background-image: url('hero1.jpg'); }
}

/* MOBILE */
@media (max-width: 900px) {
    .hero h1 {
        font-size:50px;
        text-align:center;
    }

    nav a {
        font-size:11px;
        margin:0 6px;
    }
}
</style>
