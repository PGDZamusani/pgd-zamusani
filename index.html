<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGD Zamušani</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    scroll-behavior:smooth;
}

/* MENU */
nav {
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.7);
    padding:15px;
    text-align:center;
    z-index:1000;
}

nav a {
    color:white;
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover {
    color:#ffcc00;
}

/* HERO */
.hero {
    height:100vh;
    background:url("hero.jpg") center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
}

.hero h1 {
    color:black;
    background:rgba(255,255,255,0.7);
    padding:20px 40px;
    border-radius:10px;
    font-size:40px;
}

/* SECTION */
section {
    padding:80px 20px;
    text-align:center;
}

h2 {
    margin-bottom:20px;
}

/* GALLERY */
.gallery {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.gallery img {
    width:300px;
    margin:10px;
    border-radius:10px;
}

</style>
</head>

<body>

<!-- MENU -->
<nav>
    <a href="#mladina">Mladina</a>
    <a href="#starejsi">Starejši</a>
    <a href="#intervencije">Intervencije</a>
    <a href="#etno">Etno</a>
    <a href="#kontakt">Kontakt</a>
</nav>

<!-- HERO -->
<div class="hero">
    <h1>PGD Zamušani</h1>
</div>

<!-- MLADINA -->
<section id="mladina">
    <h2>Mladina</h2>
    <div class="gallery">
        <img src="mladina.jpg">
    </div>
</section>

<!-- STAREJSI -->
<section id="starejsi">
    <h2>Starejši gasilci</h2>
    <div class="gallery">
        <img src="starejsi1.jpg">
        <img src="starejsi2.jpg">
    </div>
</section>

<!-- INTERVENCIJE -->
<section id="intervencije">
    <h2>Intervencije</h2>
    <div class="gallery">
        <img src="intervencija1.jpg">
        <img src="intervencija2.jpg">
        <img src="intervencija3.jpg">
    </div>
</section>

<!-- ETNO -->
<section id="etno">
    <h2>Etnografska sekcija</h2>
    <div class="gallery">
        <img src="etno.jpg">
    </div>
</section>

<!-- KONTAKT -->
<section id="kontakt">
    <h2>Kontakt</h2>
    <p><b>Poveljnik:</b> Bojan Vozlič<br>070-711-570</p>
    <p><b>Predsednik:</b> Matjaž Cajnko<br>068608677</p>
</section>

</body>
</html>
