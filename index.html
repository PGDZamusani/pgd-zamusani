<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGD ZAMUŠANI</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#111;
}

/* NAV */
nav {
    position:fixed;
    top:0;
    width:100%;
    background:rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
    padding:15px;
    text-align:center;
    z-index:1000;
}

nav a {
    color:white;
    margin:0 12px;
    text-decoration:none;
    font-weight:bold;
    text-transform:uppercase;
    font-size:13px;
}

nav a:hover {
    color:red;
}

/* HERO */
.hero {
    position:relative;
    height:100vh;
    background-size:cover;
    background-position:center;
}

/* TEMNI OVERLAY */
.hero::before {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(to top, rgba(0,0,0,0.7), rgba(0,0,0,0.2));
}

/* CONTENT */
.hero-content {
    position:absolute;
    bottom:60px;
    left:60px;
    display:flex;
    align-items:center;
    gap:20px;
    z-index:2;

    background:rgba(0,0,0,0.3);
    padding:20px 25px;
    border-radius:20px;
    backdrop-filter: blur(8px);
}

/* LOGO */
.hero-content img {
    height:90px;
    background:white;
    padding:5px;
    border-radius:10px;
}

/* TEXT */
.hero-content h1 {
    color:white;
    font-size:65px;
    margin:0;
    text-transform:uppercase;
}

/* MOBILE */
@media (max-width: 900px) {
    .hero-content {
        left:20px;
        bottom:30px;
        flex-direction:column;
        text-align:center;
    }

    .hero-content h1 {
        font-size:35px;
    }

    .hero-content img {
        height:70px;
    }
}
</style>
</head>

<body>

<nav>
    <a href="#">ZGODOVINA DRUŠTVA</a>
    <a href="#">DELO Z MLADINO</a>
    <a href="#">STAREJŠI GASILCI</a>
    <a href="#">ZAMUŠANSKA NOČ</a>
    <a href="#">INTERVENCIJE</a>
    <a href="#">KONTAKT</a>
</nav>

<div class="hero" id="hero">

    <div class="hero-content">
        <img src="grb.png">
        <h1>PGD ZAMUŠANI</h1>
    </div>

</div>

<script>
const images = [
    "hero1.jpg",
    "hero2.jpg",
    "hero3.jpg.jpeg"
];

let i = 0;

function changeBg() {
    document.getElementById("hero").style.backgroundImage =
        "url('" + images[i] + "')";
    i = (i + 1) % images.length;
}

changeBg();
setInterval(changeBg, 25000);
</script>

</body>
</html>
