<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGD ZAMUŠANI</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin:0;
      font-family: Arial, sans-serif;
    }

    /* NAV */
    nav {
      position: fixed;
      top:0;
      width:100%;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      z-index:1000;
    }

    .nav-wrap {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px;
    }

    /* LOGO */
    .logo-text {
      color:white;
      text-decoration:none;
      font-weight:bold;
      text-transform:uppercase;
      font-size:18px;
    }

    /* MENU */
    .menu a {
      color:white;
      margin:0 10px;
      text-decoration:none;
      font-weight:bold;
      text-transform:uppercase;
      font-size:13px;
    }

    .menu a:hover {
      color:red;
    }

    /* HERO */
    .hero {
      position:relative;
      height:100vh;
      overflow:hidden;
    }

    .slide {
      position:absolute;
      width:100%;
      height:100%;
      background-size:cover;
      background-position:center;
      opacity:0;
      transform:scale(1);
      transition:opacity 2s;
    }

    .slide.active {
      opacity:1;
      animation: zoom 25s linear;
    }

    @keyframes zoom {
      from { transform:scale(1); }
      to { transform:scale(1.08); }
    }

    /* CONTENT */
    .hero-content {
      position:absolute;
      bottom:50px;
      left:50px;
      display:flex;
      align-items:center;
      gap:20px;
      background:rgba(0,0,0,0.2);
      padding:20px;
      border-radius:20px;
    }

    .hero-content img {
      height:90px;
      background:white;
      padding:5px;
      border-radius:10px;
    }

    .hero-content h1 {
      color:white;
      font-size:60px;
      margin:0;
      text-transform:uppercase;
    }

    /* MOBILE */
    @media (max-width:900px) {
      .nav-wrap {
        flex-direction:column;
      }

      .hero-content {
        left:20px;
        bottom:20px;
        flex-direction:column;
        text-align:center;
      }

      .hero-content h1 {
        font-size:35px;
      }

      .hero-content img {
        height:70px;
      }
    }

  </style>
</head>

<body>

<nav>
  <div class="nav-wrap">

    <!-- ✔ KLIK NA LOGO -->
    <a href="index.html" class="logo-text">PGD ZAMUŠANI</a>

    <div class="menu">
      <a href="zgodovina.html">ZGODOVINA DRUŠTVA</a>
      <a href="mladina.html">DELO Z MLADINO</a>
      <a href="starejsi.html">STAREJŠI GASILCI</a>
      <a href="zamusanska-noc.html">ZAMUŠANSKA NOČ</a>
      <a href="intervencije.html">INTERVENCIJE</a>
      <a href="kontakt.html">KONTAKT</a>
    </div>

  </div>
</nav>

<div class="hero">

  <!-- SLIKE -->
  <div class="slide active" style="background-image:url('hero1.jpg')"></div>
  <div class="slide" style="background-image:url('hero2.jpg')"></div>
  <div class="slide" style="background-image:url('hero3.jpg.jpeg')"></div>

  <!-- TEKST -->
  <div class="hero-content">
    <img src="grb.png">
    <h1>PGD ZAMUŠANI</h1>
  </div>

</div>

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

function changeSlide() {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}

setInterval(changeSlide, 25000);
</script>

</body>
</html>
