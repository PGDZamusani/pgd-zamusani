<title>PGD Zamušani</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

nav {
    position: fixed;
    top: 0;
    width: 100%;
    background: rgba(0,0,0,0.75);
    padding: 15px 10px;
    text-align: center;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
    font-weight: bold;
    text-transform: uppercase;
    font-size: 14px;
}

nav a:hover {
    color: red;
}

.hero {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #d9d9d9;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    animation: slideshow 15s infinite;
}

.hero h1 {
    color: black;
    font-size: 90px;
    text-transform: uppercase;
    margin: 0;
    text-align: center;
}

@keyframes slideshow {
    0% { background-image: url('hero1.jpg'); }
    33% { background-image: url('hero2.jpg'); }
    66% { background-image: url('hero3.jpg'); }
    100% { background-image: url('hero1.jpg'); }
}

@media (max-width: 900px) {
    .hero h1 {
        font-size: 52px;
    }

    nav a {
        font-size: 12px;
        margin: 0 6px;
    }
}
</style>
