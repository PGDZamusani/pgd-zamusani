<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZGODOVINA DRUŠTVA - PGD ZAMUŠANI</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      color: #111;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.78);
      backdrop-filter: blur(6px);
      z-index: 1000;
    }

    .nav-wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .logo-text {
      color: white;
      text-decoration: none;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 16px;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .logo-text:hover {
      color: #ff4d4d;
    }

    #menu-toggle {
      display: none;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
    }

    .hamburger span {
      width: 28px;
      height: 3px;
      background: white;
      display: block;
      border-radius: 2px;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .menu a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 13px;
      letter-spacing: 0.3px;
    }

    .menu a:hover {
      color: red;
    }

    .hero-small {
      height: 46vh;
      min-height: 320px;
      background: url('hero1.jpg') center/cover no-repeat;
      display: flex;
      align-items: flex-end;
      padding: 0 0 40px 0;
      position: relative;
      margin-top: 48px;
    }

    .hero-small::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.55), rgba(0,0,0,0.15));
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .hero-inner img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      background: rgba(255,255,255,0.92);
      padding: 6px;
      border-radius: 10px;
    }

    .hero-inner h1 {
      margin: 0;
      color: white;
      text-transform: uppercase;
      font-size: 48px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 50px 20px;
    }

    .intro-box {
      background: white;
      border-radius: 22px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      margin-top: -40px;
      position: relative;
      z-index: 5;
    }

    .intro-box p {
      line-height: 1.8;
      font-size: 17px;
      margin: 0 0 18px 0;
    }

    .section-title {
      margin: 50px 0 20px 0;
      font-size: 30px;
      text-transform: uppercase;
      color: #111;
    }

    .timeline {
      display: grid;
      gap: 16px;
    }

    .timeline-item {
      background: white;
      border-left: 6px solid #b30000;
      border-radius: 16px;
      padding: 18px 20px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.06);
    }

    .timeline-item strong {
      color: #b30000;
      display: block;
      margin-bottom: 6px;
      font-size: 18px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin-top: 20px;
    }

    .gallery img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      border-radius: 18px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.08);
    }

    footer {
      background: #111;
      color: white;
      text-align: center;
      padding: 24px 20px;
      margin-top: 40px;
      text-transform: uppercase;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .hamburger {
        display: flex;
      }

      .menu {
        display: none;
        width: 100%;
        flex-direction: column;
        gap: 0;
        padding-top: 10px;
      }

      .menu a {
        display: block;
        width: 100%;
        text-align: center;
        padding: 12px 6px;
        border-top: 1px solid rgba(255,255,255,0.12);
        font-size: 13px;
      }

      #menu-toggle:checked ~ .menu {
        display: flex;
      }

      .nav-wrap {
        flex-wrap: wrap;
      }

      .hero-inner {
        flex-direction: column;
        align-items: flex-start;
      }

      .hero-inner h1 {
        font-size: 34px;
      }

      .intro-box {
        padding: 22px;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-wrap">
      <a href="index.html" class="logo-text">PGD ZAMUŠANI</a>

      <input type="checkbox" id="menu-toggle
